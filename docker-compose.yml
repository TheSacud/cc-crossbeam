services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      SUPABASE_URL: ${SERVER_SUPABASE_URL:-http://host.docker.internal:54321}
      SUPABASE_PUBLIC_URL: ${NEXT_PUBLIC_SUPABASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - crossbeam

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    env_file:
      - ./frontend/.env.local
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      CLOUD_RUN_URL: http://server:3001
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - crossbeam

networks:
  crossbeam:
    driver: bridge
